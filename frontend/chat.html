<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能问答 - 掌柜智库</title>
    <link rel="stylesheet" href="/static/css/common.css">
    <style>
        .main { height: 100vh; }
        .topbar { justify-content: space-between; }
        .topbar .session-info { font-size: 13px; color: var(--text-light); }

        .chat-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 72%;
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.75;
            word-wrap: break-word;
            box-shadow: var(--shadow-sm);
        }
        .message.user {
            align-self: flex-end;
            background: var(--gradient);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.assistant {
            align-self: flex-start;
            background: var(--card-bg);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }
        .message .text-content { white-space: pre-wrap; }
        .message img {
            max-width: 100%;
            border-radius: 8px;
            margin: 8px 0;
            box-shadow: var(--shadow);
        }
        .message .item-names {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-light);
        }
        .message .item-names .tag {
            display: inline-block;
            background: #f0f4ff;
            color: var(--primary);
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 4px;
        }

        /* 打字指示器 */
        .typing-indicator {
            align-self: flex-start;
            display: flex;
            gap: 5px;
            padding: 16px 20px;
            background: var(--card-bg);
            border-radius: 14px;
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow-sm);
        }
        .typing-indicator span {
            width: 8px; height: 8px;
            background: var(--text-light);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        /* 欢迎页 */
        .welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: var(--text-light);
        }
        .welcome-screen .welcome-icon { font-size: 56px; }
        .welcome-screen .welcome-title { font-size: 20px; font-weight: 600; color: var(--text); }
        .welcome-screen .welcome-desc { font-size: 14px; max-width: 400px; text-align: center; line-height: 1.6; }
        .welcome-screen .suggestions {
            display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; justify-content: center;
        }
        .welcome-screen .suggestion-chip {
            padding: 8px 16px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        .welcome-screen .suggestion-chip:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* 输入区域 */
        .input-area {
            padding: 16px 32px;
            background: var(--card-bg);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .input-area input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        .input-area input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .input-area button {
            padding: 14px 28px;
            background: var(--gradient);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .input-area button:hover { opacity: 0.9; transform: translateY(-1px); }
        .input-area button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon">📚</div>
                <span>掌柜智库</span>
            </div>
            <div class="subtitle">Advanced RAG System</div>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="nav-item">
                <span class="nav-icon">🏠</span>
                <span>系统首页</span>
            </a>
            <a href="/import" class="nav-item">
                <span class="nav-icon">📥</span>
                <span>知识库导入</span>
            </a>
            <a href="/chat" class="nav-item active">
                <span class="nav-icon">💬</span>
                <span>智能问答</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <span class="status-dot"></span>
            <span>服务运行中</span>
        </div>
    </aside>

    <!-- 主内容 -->
    <div class="main">
        <div class="topbar">
            <h2>💬 智能问答</h2>
            <div class="topbar-actions">
                <span class="session-info" id="sessionInfo"></span>
                <button class="btn btn-ghost" onclick="newSession()">🔄 新对话</button>
            </div>
        </div>

        <div class="chat-wrapper">
            <div class="chat-container" id="chatContainer">
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-icon">💬</div>
                    <div class="welcome-title">欢迎使用掌柜智库</div>
                    <div class="welcome-desc">基于多路混合检索 (Dense + BM25 + HyDE + 网络搜索)，为您提供精准的智能问答服务。</div>
                    <div class="suggestions">
                        <div class="suggestion-chip" onclick="quickAsk('这个产品的使用方法是什么？')">📋 产品使用方法</div>
                        <div class="suggestion-chip" onclick="quickAsk('设备的技术参数有哪些？')">⚙️ 设备技术参数</div>
                        <div class="suggestion-chip" onclick="quickAsk('常见的故障及排除方法？')">🔧 故障排除</div>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="queryInput" placeholder="输入你的问题..." autocomplete="off">
                <button id="sendBtn" onclick="sendQuery()">发送</button>
            </div>
        </div>
    </div>

    <script src="/static/js/config.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/chat.js"></script>
</body>
</html>
